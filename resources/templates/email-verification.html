<div
  style="
    max-width: 600px;
    margin: 0 auto;
    padding: 24px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #333;
    line-height: 1.6;
  "
>
  <h2 style="margin: 0 0 24px 0; font-size: 24px; font-weight: 600">Verify Your Email</h2>

  <p style="margin: 0 0 16px 0">Hello, {{name}}</p>

  <p style="margin: 0 0 16px 0">Please verify your email address by clicking the button below:</p>

  <div style="margin: 24px 0">
    <a
      href="{{verificationLink}}"
      style="
        display: inline-block;
        padding: 10px 18px;
        background-color: #28a745;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
      "
    >
      Verify Email
    </a>
  </div>

  <p style="margin: 0 0 8px 0; font-size: 14px; color: #666">
    Or copy and paste this link into your browser:
  </p>
  <p style="margin: 0 0 24px 0; font-size: 14px; color: #666; word-break: break-all">
    {{verificationLink}}
  </p>

  <p
    style="
      margin: 0;
      padding: 16px;
      background-color: #fff3cd;
      border-left: 4px solid #ffc107;
      font-size: 14px;
    "
  >
    <strong style="font-weight: 600">Important:</strong> This link will expire in 1 hour. If you did
    not create an account, please ignore this email.
  </p>
</div>
