<div
  style="
    max-width: 600px;
    margin: 0 auto;
    padding: 32px;
    font-family:
      system-ui,
      -apple-system,
      'Segoe UI',
      Roboto,
      Helvetica,
      sans-serif;
    color: #333333;
    line-height: 1.6;
    background-color: #ffffff;
  "
>
  <h2 style="margin: 0 0 24px 0; font-size: 24px; font-weight: 600; color: #333333">
    Password Reset Confirmed
  </h2>

  <p style="margin: 0 0 16px 0; color: #333333">Hello, {{name}}</p>

  <p style="margin: 0 0 32px 0; color: #333333">Your password has been successfully reset.</p>

  <div
    style="
      margin: 0;
      padding: 16px;
      background-color: #dcfce7;
      border-left: 4px solid #22c55e;
      border-radius: 8px;
      font-size: 14px;
    "
  >
    <p style="margin: 0; color: #333333">
      <strong style="font-weight: 600; color: #166534">Security Notice:</strong> If you did not
      reset your password, please contact our support team immediately.
    </p>
  </div>
</div>
