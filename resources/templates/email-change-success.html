<div
  style="
    max-width: 600px;
    margin: 0 auto;
    padding: 24px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #333;
    line-height: 1.6;
  "
>
  <h2 style="margin: 0 0 24px 0; font-size: 24px; font-weight: 600">Email Change Successful</h2>

  <p style="margin: 0 0 16px 0">Hello {{name}},</p>

  <p style="margin: 0 0 16px 0">
    Your email address has been successfully changed to
    <strong style="font-weight: 600">{{newEmail}}</strong>.
  </p>

  <p
    style="
      margin: 0 0 8px 0;
      padding: 16px;
      background-color: #d4edda;
      border-left: 4px solid #28a745;
      font-size: 14px;
    "
  >
    <strong style="font-weight: 600">Security Notice:</strong> All your sessions have been
    terminated for security. Please sign in again with your new email address.
  </p>

  <p style="margin: 0; font-size: 14px; color: #666">
    If you did not make this change, please contact support immediately.
  </p>
</div>
